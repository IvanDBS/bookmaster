services:
  db:
    image: postgres:15-alpine
    container_name: bookmaster_db
    env_file:
      - compose.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bookmaster_redis

  web:
    build: .
    container_name: bookmaster_web
    env_file:
      - compose.env
    environment:
      RAILS_MAX_THREADS: 5
    depends_on:
      - db
      - redis
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
    command: ./bin/rails server -b 0.0.0.0

  worker:
    build: .
    container_name: bookmaster_worker
    env_file:
      - compose.env
    environment:
      RAILS_MAX_THREADS: 5
    depends_on:
      - db
      - redis
    volumes:
      - .:/rails
    command: bundle exec sidekiq

  frontend:
    image: node:20-alpine
    container_name: bookmaster_frontend
    working_dir: /app
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
    depends_on:
      - web
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    command: sh -c "[ -d node_modules ] || npm ci && npm run dev -- --host 0.0.0.0"

volumes:
  pgdata:
  node_modules:


